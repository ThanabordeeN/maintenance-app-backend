name: Trigger Staging Deploy

on:
  push:
    branches:
      - dev

jobs:
  trigger-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch staging deploy to qsmart
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.QSMART_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/ThanabordeeN/qsmart/dispatches \
            -d '{"event_type":"staging-deploy","client_payload":{"repo":"${{ github.repository }}","sha":"${{ github.sha }}"}}'
